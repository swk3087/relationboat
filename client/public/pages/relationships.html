<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <title>RelationBoat - 관계</title>
  </head>
  <body>
    <div class="mobile-shell" id="app">
      <header class="topbar">
        <h1>관계 / 경로</h1>
        <p>관계를 생성하고 최대 깊이 8단계까지 경로를 조회합니다.</p>
      </header>

      <main class="screen">
        <section class="card row inline">
          <label>
            폴더 선택
            <select id="folder-select"></select>
          </label>
          <p class="helper">관계는 폴더 범위를 벗어나지 않습니다.</p>
        </section>

        <section class="card">
          <h2>관계 생성</h2>
          <form id="create-relationship-form" class="stack">
            <label>
              From
              <select id="from-person-id" name="fromPersonId"></select>
            </label>
            <label>
              To
              <select id="to-person-id" name="toPersonId"></select>
            </label>
            <label>
              제목
              <input name="title" type="text" placeholder="친구" required />
            </label>
            <label>
              메모
              <textarea name="memo"></textarea>
            </label>
            <label>
              카테고리(쉼표 구분)
              <input name="categories" type="text" placeholder="친구,스터디" />
            </label>
            <button type="submit">관계 저장</button>
          </form>
        </section>

        <section class="card">
          <h2>관계 검색</h2>
          <form id="relationship-search-form" class="stack">
            <label>
              키워드(q)
              <input name="q" type="text" />
            </label>
            <label>
              카테고리
              <input name="category" type="text" />
            </label>
            <label>
              fromPersonId(선택)
              <input name="fromPersonId" type="text" />
            </label>
            <label>
              toPersonId(선택)
              <input name="toPersonId" type="text" />
            </label>
            <button type="submit" class="secondary">검색</button>
          </form>
          <div id="relationship-list" class="list"></div>
        </section>

        <section class="card">
          <h2>경로 조회</h2>
          <form id="pathway-form" class="stack">
            <label>
              Source
              <select name="sourceId" id="source-id"></select>
            </label>
            <label>
              Target
              <select name="targetId" id="target-id"></select>
            </label>
            <label>
              Depth (0-8)
              <input name="depth" type="number" min="0" max="8" value="3" />
            </label>
            <button type="submit">경로 조회</button>
          </form>
          <pre id="pathway-output" class="list-item" style="white-space: pre-wrap"></pre>
        </section>

        <p id="message" class="alert hidden"></p>
      </main>
    </div>

    <script type="module" src="/js/relationships.js"></script>
  </body>
</html>
