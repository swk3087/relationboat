<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <title>RelationBoat - 설정</title>
  </head>
  <body>
    <div class="mobile-shell" id="app">
      <header class="topbar">
        <h1>설정</h1>
        <p>저장 모드는 서버 전용(sync)으로 고정됩니다.</p>
      </header>

      <main class="screen">
        <section class="card">
          <h2>앱 설정</h2>
          <form id="settings-form" class="stack">
            <label>
              저장 방식
              <input id="storage-mode" type="text" value="sync" readonly />
            </label>
            <label>
              폰트 이름
              <input id="font-family" type="text" placeholder="Pretendard" />
            </label>
            <label>
              커스텀 폰트 URL
              <input id="font-file-url" type="url" placeholder="https://..." />
            </label>
            <button type="submit">설정 저장</button>
          </form>
        </section>

        <section class="card">
          <h2>기본 폰트 목록</h2>
          <div id="font-list" class="list"></div>
        </section>

        <section class="card">
          <h2>Google/Firebase 로그인 안내</h2>
          <p class="helper">
            로그인은 Firebase Web SDK를 사용하며, 실제 인증은 backend의 `/auth/google`로 전달되어 JWT 세션을 생성합니다.
          </p>
          <a href="/login" class="secondary" style="display: inline-block; text-decoration: none; padding: 10px 14px;">로그인 화면으로</a>
        </section>

        <section class="card">
          <button id="logout-button" class="danger" type="button">로그아웃</button>
        </section>

        <p id="message" class="alert hidden"></p>
      </main>
    </div>

    <script type="module" src="/js/settings.js"></script>
  </body>
</html>
