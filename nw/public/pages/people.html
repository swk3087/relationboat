<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <title>RelationBoat - 사람</title>
  </head>
  <body>
    <div class="mobile-shell" id="app">
      <header class="topbar">
        <h1>사람 관리</h1>
        <p>폴더별 사람 생성과 검색(이름/전화번호/메모/카테고리)을 지원합니다.</p>
      </header>

      <main class="screen">
        <section class="card row inline">
          <label>
            폴더 선택
            <select id="folder-select"></select>
          </label>
          <div class="muted">선택한 폴더 안에서만 조회/생성됩니다.</div>
        </section>

        <section class="card">
          <h2>사람 추가</h2>
          <form id="create-person-form" class="stack">
            <label>
              이름
              <input name="name" type="text" required />
            </label>
            <label>
              전화번호
              <input name="phone" type="text" placeholder="01012345678" />
            </label>
            <label>
              메모
              <textarea name="memo" placeholder="메모"></textarea>
            </label>
            <button type="submit">저장</button>
          </form>
        </section>

        <section class="card">
          <h2>검색</h2>
          <form id="search-form" class="stack">
            <label>
              이름/통합 키워드(q)
              <input name="q" type="text" placeholder="이름 또는 키워드" />
            </label>
            <label>
              전화번호 필터(로컬 화면 필터)
              <input name="phone" type="text" placeholder="전화번호 일부" />
            </label>
            <label>
              메모 필터(로컬 화면 필터)
              <input name="memo" type="text" placeholder="메모 일부" />
            </label>
            <label>
              관계 카테고리
              <input name="category" type="text" placeholder="친구" />
            </label>
            <button type="submit" class="secondary">검색 갱신</button>
          </form>
        </section>

        <section class="card">
          <h2>결과</h2>
          <div id="people-list" class="list"></div>
        </section>

        <p id="message" class="alert hidden"></p>
      </main>
    </div>

    <script type="module" src="/js/people.js"></script>
  </body>
</html>
