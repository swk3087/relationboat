<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <title>RelationBoat - 연락처 업로드</title>
  </head>
  <body>
    <div class="mobile-shell" id="app">
      <header class="topbar">
        <h1>VCF 연락처 업로드</h1>
        <p>VCF/vCard 파일에서 이름/전화번호를 추출해 폴더에 바로 추가합니다.</p>
      </header>

      <main class="screen">
        <section class="card">
          <h2>업로드</h2>
          <form id="upload-form" class="stack" enctype="multipart/form-data">
            <label>
              대상 폴더
              <select id="folder-select"></select>
            </label>
            <label>
              파일 (.vcf)
              <input name="file" type="file" accept=".vcf,.vcard,text/vcard,text/x-vcard" required />
            </label>
            <button type="submit">서버로 업로드</button>
          </form>
          <p class="helper">인코딩(quoted-printable/euc-kr/utf-8) 이름도 자동 디코딩하여 저장합니다.</p>
        </section>

        <section class="card">
          <h2>추가된 연락처 미리보기</h2>
          <div id="import-preview" class="list"></div>
        </section>

        <p id="message" class="alert hidden"></p>
      </main>
    </div>

    <script type="module" src="/js/contacts.js"></script>
  </body>
</html>
